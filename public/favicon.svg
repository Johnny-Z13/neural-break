<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Neural Break tab icon: glitched pixel N, cyan over magenta RGB-split on CRT-dark tile -->
  <rect width="64" height="64" rx="12" fill="#0a0a16"/>
  <rect x="1" y="1" width="62" height="62" rx="11" fill="none" stroke="#00ffff" stroke-opacity="0.4" stroke-width="2"/>
  <!-- magenta ghost (RGB split) -->
  <g fill="#ff00ff" opacity="0.9" transform="translate(2.5,2.5)">
    <rect x="14" y="11" width="7" height="14"/><rect x="42" y="11" width="7" height="14"/><rect x="21" y="18" width="7" height="7"/>
    <rect x="11" y="25" width="7" height="7"/><rect x="25" y="25" width="7" height="7"/><rect x="39" y="25" width="7" height="7"/>
    <rect x="14" y="32" width="7" height="21"/><rect x="42" y="32" width="7" height="21"/><rect x="35" y="32" width="7" height="7"/>
  </g>
  <!-- cyan N: 5x6 pixel grid; middle row glitch-shifted 3px left -->
  <g fill="#00ffff">
    <!-- top: verticals + first diagonal cell -->
    <rect x="14" y="11" width="7" height="14"/>
    <rect x="42" y="11" width="7" height="14"/>
    <rect x="21" y="18" width="7" height="7"/>
    <!-- glitch band (row 3), shifted left -->
    <rect x="11" y="25" width="7" height="7"/>
    <rect x="25" y="25" width="7" height="7"/>
    <rect x="39" y="25" width="7" height="7"/>
    <!-- bottom: verticals + last diagonal cell -->
    <rect x="14" y="32" width="7" height="21"/>
    <rect x="42" y="32" width="7" height="21"/>
    <rect x="35" y="32" width="7" height="7"/>
  </g>
  <!-- scanlines over everything -->
  <g fill="#000000" opacity="0.28">
    <rect y="8" width="64" height="1.5"/>
    <rect y="18" width="64" height="1.5"/>
    <rect y="28" width="64" height="1.5"/>
    <rect y="38" width="64" height="1.5"/>
    <rect y="48" width="64" height="1.5"/>
    <rect y="58" width="64" height="1.5"/>
  </g>
</svg>
